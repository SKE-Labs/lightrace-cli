name: Publish npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Ensure npm supports trusted publishing (>= 11.5.1)
        run: npm install -g npm@11

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd npm
          node -e "const p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2))"

      - name: Install deps (skip postinstall — no binary needed for publish)
        run: cd npm && npm install --ignore-scripts

      - name: Publish (OIDC trusted publishing — no token needed)
        run: cd npm && npm publish
